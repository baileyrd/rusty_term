name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  win-x64:
    name: win-x64 release asset
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --features gui

      - name: Package
        id: package
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          $zip = "rusty_term-$ver-win-x64.zip"
          Compress-Archive -Path target/release/rusty_term.exe -DestinationPath $zip
          "asset=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
          fail_on_unmatched_files: true
