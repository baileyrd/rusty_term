name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install GUI build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev
      # Linted/tested against gui+l13+web-bridge together (a superset of
      # default) rather than also against bare default: gui/l13/web-bridge
      # -only helpers (settings-page I/O, the L13 side-channel, the bridge's
      # own hand-rolled WebSocket codec) are legitimately unused when
      # compiled without their feature, which trips clippy's dead-code lint
      # under `-D warnings` for no real bug. l13 now resolves `rusty_lsp`
      # over git (see l13/Cargo.toml) rather than a local sibling checkout,
      # so it needs no special-casing here anymore — just network access,
      # which this runner has. web-bridge was folded in here rather than
      # given its own job because it previously had none at all: the hand-
      # rolled RFC 6455 codec and PTY bridge server (src/web_bridge/, with
      # its own unit tests) were invisible to CI.
      - name: Clippy (gui + l13 + web-bridge features)
        run: cargo clippy --all-targets --features gui,l13,web-bridge -- -D warnings
      - name: Test (gui + l13 + web-bridge features)
        run: cargo test --features gui,l13,web-bridge
      - name: Test (rusty_term_l13 crate, standalone)
        run: cargo test -p rusty_term_l13
