name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install GUI build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev
      # Linted/tested against the `gui` feature (a superset of default) rather
      # than also against bare default: gui-only helpers (settings-page I/O)
      # are legitimately unused when compiled without it, which trips
      # clippy's dead-code lint under `-D warnings` for no real bug. `l13` is
      # excluded — it pulls the sibling `rusty_lsp` checkout (G9), not
      # available here.
      - name: Clippy (gui feature)
        run: cargo clippy --all-targets --features gui -- -D warnings
      - name: Test (gui feature)
        run: cargo test --features gui
