[package]
name = "rusty_term"
version = "0.1.0"
edition = "2024"
default-run = "rusty_term"

[features]
default = ["threaded"]
# Threaded runtime: one OS thread each for parse, input pump, and render,
# coordinated by a condvar (no async dependencies). The default.
threaded = []
# Tokio runtime: a single async reactor drives the PTY master, host stdin, the
# SIGWINCH stream, and render coalescing. Unix-only (uses tokio's `AsyncFd` on
# the PTY master fd). Takes precedence over `threaded` when enabled, so build it
# with just `--features tokio-runtime`.
tokio-runtime = ["dep:tokio"]

[dependencies]
libc = "0.2.186"
parking_lot = "0.12"
unicode-width = "0.2"
unicode-segmentation = "1"
tokio = { version = "1", optional = true, default-features = false, features = [
    "rt-multi-thread",
    "net",
    "signal",
    "time",
    "sync",
    "macros",
] }

# ConPTY backend: Windows-only, so the Linux/macOS build never pulls it in.
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_Threading",
    "Win32_System_Pipes",
    "Win32_System_IO",
    "Win32_Storage_FileSystem",
] }
