[package]
name = "rusty_term"
version = "0.1.0"
edition = "2024"
default-run = "rusty_term"

[dependencies]
libc = "0.2.186"
unicode-width = "0.2"

# ConPTY backend: Windows-only, so the Linux/macOS build never pulls it in.
[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_Console",
    "Win32_System_Threading",
    "Win32_System_Pipes",
    "Win32_System_IO",
    "Win32_Storage_FileSystem",
] }
